apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-app
  namespace: lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-app
  template:
    metadata:
      labels:
        app: lms-app
    spec:
      containers:
        - name: lms-app
          image: your-dockerhub/lms-app:1.0
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: lms-config
            - secretRef:
                name: lms-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lms-service
  namespace: lms
spec:
  selector:
    app: lms-app
  ports:
    - port: 3000
      targetPort: 3000
